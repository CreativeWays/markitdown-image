apiVersion: v1
kind: Service
metadata:
  name: {{ include "markitdown.fullname" . }}
  labels:
    {{- include "markitdown.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
  selector:
    {{- include "markitdown.selectorLabels" . | nindent 4 }}
